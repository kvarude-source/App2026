<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินความเสี่ยงโรค NCDs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🩺 ระบบประเมินความเสี่ยงโรค NCDs</h2>
        <p>กรุณากรอกข้อมูลเพื่อประเมินความเสี่ยงเบื้องต้น (เบาหวาน, ความดัน, โรคอ้วน)</p>
        
        <form id="ncdForm">
            <div class="form-group">
                <label for="name">ชื่อ-นามสกุล:</label>
                <input type="text" id="name" required>
            </div>
            
            <div class="form-group">
                <label for="weight">น้ำหนัก (กิโลกรัม):</label>
                <input type="number" id="weight" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="height">ส่วนสูง (เซนติเมตร):</label>
                <input type="number" id="height" required>
            </div>

            <div class="form-group">
                <label for="bloodPressure">ความดันโลหิตตัวบน (Systolic BP):</label>
                <input type="number" id="bloodPressure" placeholder="เช่น 120" required>
            </div>

            <div class="form-group">
                <label for="bloodSugar">น้ำตาลในเลือด (Fasting Blood Sugar):</label>
                <input type="number" id="bloodSugar" placeholder="เช่น 95" required>
            </div>

            <button type="submit" id="submitBtn">ประเมินความเสี่ยงและบันทึกข้อมูล</button>
        </form>

        <div id="resultArea" class="hidden">
            <h3>ผลการประเมิน:</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
